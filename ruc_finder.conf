# /etc/ruc_finder/ruc_finder.conf
# RUC Finder configuration file

[server]
host = "0.0.0.0"
port = 3000

[database]
# If DATABASE_URL is set in the environment (or .env file), comment out the line below.
# Environment variables always take precedence over this config file.
# url = "postgres://user:password@localhost:5432/paraguay"
pool_size = 10

[sync]
# How often to check for new data on the DNIT website (in hours)
interval_hours = 24
# Number of records to upsert per database transaction
batch_size = 1000
# DNIT page to scrape for ZIP download links and reference date
page_url = "https://www.dnit.gov.py/web/portal-institucional/listado-de-ruc-con-sus-equivalencias"
# CIDR networks allowed to call POST /api/v1/sync.
# Only requests originating from these networks can trigger a sync.
# If empty or omitted, the endpoint is open to all (NOT recommended in production).
# Example: ECHOSISTEMA_VPC_NETWORK
allowed_networks = []

[paths]
download_dir = "input/tmp"
output_dir = "./output"

[search]
# Default number of results per page (all paginated endpoints)
pagination_limit = 25
# Maximum allowed value for the "limit" query parameter
pagination_max = 200
# Default number of results per page for fuzzy search
fuzzy_limit = 25
# Maximum allowed value for the "limit" parameter in fuzzy search
fuzzy_max = 200
# Default pg_trgm similarity threshold (0.0 = match everything, 1.0 = exact match)
fuzzy_threshold = 0.3
# Lowest threshold users can request (prevents overly broad searches)
fuzzy_threshold_min = 0.1
# Highest threshold users can request (prevents overly strict searches)
fuzzy_threshold_max = 0.9
