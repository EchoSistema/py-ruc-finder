name: Build and Push to DockerHub

on:
  push:
    tags: ["v*"]

env:
  DISCORD_USERNAME: "Paraguay - Ruc Finder"
  DISCORD_AVATAR: "https://flagcdn.com/w320/py.png"
  DOCKER_IMAGE: "echosistema/ruc-finder"

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.info.outputs.version }}
      tag: ${{ steps.info.outputs.tag }}
      commit_sha: ${{ steps.info.outputs.commit_sha }}
      author: ${{ steps.info.outputs.author }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect deploy info
        id: info
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          COMMIT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          AUTHOR="${GITHUB_ACTOR}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:'• %s' "${PREV_TAG}..${TAG}" | head -20)
          else
            CHANGELOG=$(git log --pretty=format:'• %s' -10)
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml version
        run: |
          if [ "${{ steps.info.outputs.version }}" != "${{ steps.info.outputs.cargo_version }}" ]; then
            echo "::error::Tag v${{ steps.info.outputs.version }} does not match Cargo.toml version ${{ steps.info.outputs.cargo_version }}"
            exit 1
          fi

      - name: Notify Discord — build started
        run: |
          curl -s -H "Content-Type: application/json" -d '{
            "username": "${{ env.DISCORD_USERNAME }}",
            "avatar_url": "${{ env.DISCORD_AVATAR }}",
            "embeds": [{
              "title": "🚀 Build Iniciado — ruc-finder",
              "color": 16761095,
              "fields": [
                { "name": "Versão", "value": "`${{ steps.info.outputs.tag }}`", "inline": true },
                { "name": "Commit", "value": "`${{ steps.info.outputs.commit_sha }}`", "inline": true },
                { "name": "Autor", "value": "${{ steps.info.outputs.author }}", "inline": true },
                { "name": "Mensagem", "value": "${{ steps.info.outputs.commit_msg }}", "inline": false },
                { "name": "Changelog", "value": "${{ steps.info.outputs.changelog }}", "inline": false }
              ],
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }' "${{ secrets.DISCORD_DEPLOY_CHANNEL }}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord — build succeeded
        if: success()
        run: |
          TAGS=$(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ', ' | sed 's/,$//')
          DIGEST="${{ steps.build.outputs.digest }}"
          curl -s -H "Content-Type: application/json" -d '{
            "username": "${{ env.DISCORD_USERNAME }}",
            "avatar_url": "${{ env.DISCORD_AVATAR }}",
            "embeds": [{
              "title": "✅ Imagem Publicada — ruc-finder",
              "color": 3066993,
              "fields": [
                { "name": "Versão", "value": "`${{ steps.info.outputs.tag }}`", "inline": true },
                { "name": "Autor", "value": "${{ steps.info.outputs.author }}", "inline": true },
                { "name": "Imagem", "value": "`${{ env.DOCKER_IMAGE }}`", "inline": true },
                { "name": "Tags", "value": "`'"$TAGS"'`", "inline": false },
                { "name": "Digest", "value": "`'"${DIGEST::20}"'...`", "inline": false },
                { "name": "DockerHub", "value": "[Ver no DockerHub](https://hub.docker.com/r/${{ env.DOCKER_IMAGE }})", "inline": false }
              ],
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }]
          }' "${{ secrets.DISCORD_DEPLOY_CHANNEL }}"

      - name: Notify Discord — build failed
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" -d '{
            "username": "${{ env.DISCORD_USERNAME }}",
            "avatar_url": "${{ env.DISCORD_AVATAR }}",
            "embeds": [{
              "title": "❌ Build Falhou — ruc-finder",
              "color": 15158332,
              "fields": [
                { "name": "Versão", "value": "`${{ steps.info.outputs.tag }}`", "inline": true },
                { "name": "Autor", "value": "${{ steps.info.outputs.author }}", "inline": true },
                { "name": "Commit", "value": "`${{ steps.info.outputs.commit_sha }}`", "inline": true },
                { "name": "Logs", "value": "[Ver no GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }]
          }' "${{ secrets.DISCORD_DEPLOY_CHANNEL }}"
